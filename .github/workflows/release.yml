name: Release

on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write   # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify the tag matches the project version
        run: |
          VERSION="$(./gradlew -q printVersion)"
          TAG="${GITHUB_REF_NAME#v}"
          echo "project version=$VERSION  tag=$TAG"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match project version $VERSION" >&2
            exit 1
          fi

      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Create GitHub release with the uber jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" server/build/libs/*-all.jar --generate-notes
